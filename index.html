<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون القيصر - كارت الولاء الرقمي</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --light-dark: rgba(30, 30, 30, 0.85); 
            --white: #ffffff;
            --green: #25D366;
            --blue: #007bff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=600') no-repeat center center fixed;
            background-size: cover;
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: var(--light-dark);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(8px); 
            box-sizing: border-box;
        }
        h1 {
            color: var(--gold);
            margin: 0 0 5px 0;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 15px;
        }
        .badge-working {
            background-color: var(--green);
            color: var(--dark);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stamp-slot {
            aspect-ratio: 1;
            background-color: rgba(0,0,0,0.5);
            border: 2px dashed #555;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #777;
            transition: all 0.4s ease;
        }
        .stamp-slot.active {
            border: 2px solid var(--gold);
            background-color: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
        }
        .stamp-slot.active::before {
            content: "👑";
            font-size: 18px;
        }
        .status-text {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .gift-alert {
            background: linear-gradient(45deg, #af8f2c, var(--gold));
            color: var(--dark);
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #555;
            background-color: rgba(0,0,0,0.6);
            color: var(--white);
            text-align: center;
            font-size: 16px;
        }
        input:focus {
            border-color: var(--gold);
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--gold);
            color: var(--dark);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .history-section {
            margin-top: 25px;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .history-title {
            font-size: 15px;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: bold;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
            max-height: 120px;
            overflow-y: auto;
        }
        .history-item {
            background-color: rgba(0,0,0,0.4);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            border-right: 3px solid var(--gold);
        }
        .history-date { color: #aaa; }
        .contact-section {
            margin-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            padding: 11px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .insta-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .phone-btn { background-color: var(--green); }
        .reset-btn {
            background-color: transparent;
            color: #ff4444;
            margin-top: 20px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            opacity: 0.6;
        }
        .counter-section {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
        }
        .counter-section img {
            vertical-align: middle;
            margin-right: 5px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>صالون القيصر</h1>
        <div class="subtitle">احلق 9 مرات والعاشرة مجاناً!</div>
        <div class="badge-working">⏰ مفتوح الآن | 10:00 ص - 11:00 م</div>
        <div id="giftAlert" class="gift-alert">🎉 مبروك! لقد وصلت للزيارة العاشرة، حلاقتك القادمة مجانية بالكامل!</div>
        <div class="stamps-grid" id="stampsGrid"></div>
        <div class="status-text" id="statusText">لديك 0 أختام حالياً</div>
        <div class="action-area" id="actionArea">
            <input type="text" id="secretCode" placeholder="أدخل كود الختم من الحلاق">
            <button onclick="addStamp()">إضافة ختم لبطاقتي</button>
        </div>
        <button id="useGiftBtn" style="display:none; background-color:#28a745; color:white;" onclick="resetCardAfterGift()">تفعيل الحلاقة المجانية وتصفير الكارت</button>
        <div class="history-section">
            <div class="history-title">📅 سجل زياراتك:</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
        <div class="contact-section">
            <a href="https://instagram.com/R2L6W" target="_blank" class="contact-btn insta-btn">📸 تابعنا على إنستغرام</a>
            <a href="tel:07722394090" class="contact-btn phone-btn">📞 اتصل بنا للحجز والاستفسار</a>
        </div>
        <button class="reset-btn" onclick="confirmReset()">إعادة تعيين الكارت بالكامل</button>
        
        <!-- قسم العداد التلقائي المضاف حديثاً بأسفل الصفحة -->
        <div class="counter-section">
            <span>عدد زيارات صالون القيصر: </span>
            <img src="https://counter.moe/count/r2l6w_caesar" alt="عداد الزوار">
        </div>
    </div>
    <script>
        const MASTER_CODE = "2026"; 
        let currentStamps = parseInt(localStorage.getItem('qaisar_stamps')) || 0;
        let stampHistory = JSON.parse(localStorage.getItem('qaisar_history')) || [];
        const stampsGrid = document.getElementById('stampsGrid');
        const statusText = document.getElementById('statusText');
        const giftAlert = document.getElementById('giftAlert');
        const actionArea = document.getElementById('actionArea');
        const useGiftBtn = document.getElementById('useGiftBtn');
        const historyList = document.getElementById('historyList');
        function renderCard() {
            stampsGrid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const slot = document.createElement('div');
                slot.className = 'stamp-slot';
                if (i <= currentStamps) { slot.classList.add('active'); } else { slot.innerText = i; }
                stampsGrid.appendChild(slot);
            }
            if (currentStamps >= 10) {
                statusText.innerText = "تهانينا! الكارت ممتلئ 10/10";
                giftAlert.style.display = 'block';
                actionArea.style.display = 'none';
                useGiftBtn.style.display = 'block';
            } else {
                statusText.innerText = `لديك حالياً ${currentStamps} من 10 أختام`;
                giftAlert.style.display = 'none';
                actionArea.style.display = 'flex';
                useGiftBtn.style.display = 'none';
            }
            renderHistory();
        }
        function renderHistory() {
            historyList.innerHTML = '';
            if (stampHistory.length === 0) {
                historyList.innerHTML = '<li style="color:#999; text-align:center;">لا توجد زيارات مسجلة بعد.</li>';
                return;
            }
            stampHistory.forEach((item) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<span>الختم رقم ${item.number} 👑</span><span class="history-date">${item.date}</span>`;
                historyList.appendChild(li);
            });
        }
        function addStamp() {
            const inputCode = document.getElementById('secretCode').value.trim();
            if (inputCode === MASTER_CODE) {
                if (currentStamps < 10) {
                    currentStamps++;
                    const now = new Date();
                    const formattedDate = now.toLocaleDateString('ar-EG', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' | ' + now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
                    stampHistory.unshift({ number: currentStamps, date: formattedDate });
                    localStorage.setItem('qaisar_stamps', currentStamps);
                    localStorage.setItem('qaisar_history', JSON.stringify(stampHistory));
                    renderCard();
                    document.getElementById('secretCode').value = '';
                    alert('تم إضافة الختم وتسجيل الزيارة بنجاح! 👑');
                }
            } else { alert('الكود السري خاطئ! يرجى التحقق من الحلاق.'); }
        }
        function resetCardAfterGift() {
            const pin = prompt("أدخل كود الحلاق لتأمين تصفير الكارت لبدء دورة جديدة:");
            if (pin === MASTER_CODE) {
                currentStamps = 0;
                stampHistory = [];
                localStorage.setItem('qaisar_stamps', currentStamps);
                localStorage.setItem('qaisar_history', JSON.stringify(stampHistory));
                renderCard();
                alert('تم تصفير الكارت بنجاح! 👑');
            } else { alert('الكود خاطئ، لم يتم التصفير.'); }
        }
        function confirmReset() {
            if (confirm("هل أنت متأكد أنك تريد مسح أختامك وسجل التواريخ بالكامل؟")) {
                currentStamps = 0;
                stampHistory = [];
                localStorage.setItem('qaisar_stamps', currentStamps);
                localStorage.setItem('qaisar_history', JSON.stringify(stampHistory));
                renderCard();
            }
        }
        renderCard();
    </script>
</body>
</html>
