<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون القيصر - كارت الولاء الرقمي</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --light-dark: #2a2a2a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: var(--light-dark);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        h1 {
            color: var(--gold);
            margin-bottom: 5px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        /* شبكة الأختام */
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .stamp-slot {
            aspect-ratio: 1;
            background-color: #111;
            border: 2px dashed #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            transition: all 0.4s ease;
        }

        /* شكل الختم المفعل */
        .stamp-slot.active {
            border: 2px solid var(--gold);
            background-color: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
            transform: scale(1.05);
        }

        .stamp-slot.active::before {
            content: "👑"; /* شعار القيصر للختم */
            font-size: 18px;
        }

        .status-text {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .gift-alert {
            background: linear-gradient(45deg, #af8f2c, var(--gold));
            color: var(--dark);
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* الأزرار والإدخال */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #111;
            color: var(--white);
            text-align: center;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--gold);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--gold);
            color: var(--dark);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #bfa030;
        }

        .reset-btn {
            background-color: #333;
            color: #ff4444;
            margin-top: 20px;
            font-size: 12px;
            padding: 6px;
            width: auto;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>صالون القيصر</h1>
        <div class="subtitle">احلق 9 مرات والعاشرة مجاناً!</div>

        <!-- رسالة الهدية المجانية -->
        <div id="giftAlert" class="gift-alert">
            🎉 مبروك! لقد وصلت للزيارة العاشرة، حلاقتك القادمة مجانية بالكامل!
        </div>

        <!-- كارت الأختام (10 خانات) -->
        <div class="stamps-grid" id="stampsGrid">
            <!-- سيتم توليد الخانات بواسطة الجافاسكريبت -->
        </div>

        <div class="status-text" id="statusText">لديك 0 أختام حالياً</div>

        <!-- منطقة إدخال كود الحلاق للختم -->
        <div class="action-area" id="actionArea">
            <input type="text" id="secretCode" placeholder="أدخل كود الختم من الحلاق">
            <button onclick="addStamp()">إضافة ختم لبطاقتي</button>
        </div>

        <!-- زر خاص بالحلاق لتصفير الكارت بعد تسليم الهدية للزبون -->
        <button id="useGiftBtn" style="display:none; background-color:#28a745; color:white;" onclick="resetCardAfterGift()">تفعيل الحلاقة المجانية وتصفير الكارت</button>
        
        <br>
        <button class="reset-btn" onclick="confirmReset()">إعادة تعيين الكارت بالكامل</button>
    </div>

    <script>
        // الكود السري الذي يغيره الحلاق لمنع الغش (يمكنك تعديله لأي كود تريده)
        const MASTER_CODE = "Qaisar2026"; 

        // جلب عدد الأختام الحالي من ذاكرة الهاتف أو البدء من الصفر
        let currentStamps = parseInt(localStorage.getItem('qaisar_stamps')) || 0;

        const stampsGrid = document.getElementById('stampsGrid');
        const statusText = document.getElementById('statusText');
        const giftAlert = document.getElementById('giftAlert');
        const actionArea = document.getElementById('actionArea');
        const useGiftBtn = document.getElementById('useGiftBtn');

        // بناء شبكة الأختام الـ 10 عند فتح الصفحة
        function renderCard() {
            stampsGrid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const slot = document.createElement('div');
                slot.className = 'stamp-slot';
                if (i <= currentStamps) {
                    slot.classList.add('active');
                } else {
                    slot.innerText = i;
                }
                stampsGrid.appendChild(slot);
            }

            // تحديث النصوص والواجهة بناء على عدد الأختام
            if (currentStamps >= 10) {
                statusText.innerText = "تهانينا! الكارت ممتلئ 10/10";
                giftAlert.style.display = 'block';
                actionArea.style.display = 'none'; // إخفاء خانة الختم لأن الكارت امتلأ
                useGiftBtn.style.display = 'block'; // إظهار زر التصفير للحلاق
            } else {
                statusText.innerText = `لديك حالياً ${currentStamps} من 10 أختام`;
                giftAlert.style.display = 'none';
                actionArea.style.display = 'flex';
                useGiftBtn.style.display = 'none';
            }
        }

        // دالة إضافة ختم جديد للزبون
        function addStamp() {
            const inputCode = document.getElementById('secretCode').value.trim();

            if (inputCode === MASTER_CODE) {
                if (currentStamps < 10) {
                    currentStamps++;
                    localStorage.setItem('qaisar_stamps', currentStamps);
                    renderCard();
                    document.getElementById('secretCode').value = ''; // تصفير خانة الإدخال
                    alert('تم إضافة الختم بنجاح! شكراً لزيارتك لصالون القيصر 👑');
                }
            } else {
                alert('الكود السري خاطئ! يرجى التحقق من الحلاق.');
            }
        }

        // دالة تصفير الكارت للحلاق بعد إعطاء الزبون الحلاقة المجانية
        function resetCardAfterGift() {
            const pin = prompt("أدخل كود الحلاق لتأمين تصفير الكارت بعد تسليم الهدية:");
            if (pin === MASTER_CODE) {
                currentStamps = 0;
                localStorage.setItem('qaisar_stamps', currentStamps);
                renderCard();
                alert('تم تصفير الكارت بنجاح، ننتظر الزبون في دورة جديدة! 👑');
            } else {
                alert('الكود خاطئ، لا يمكن تصفير الكارت.');
            }
        }

        // زر احتياطي للزبون في حال أراد مسح كارتة بنفسه
        function confirmReset() {
            if (confirm("هل أنت متأكد أنك تريد مسح جميع أختامك الحالية؟ لا يمكن استرجاعها!")) {
                currentStamps = 0;
                localStorage.setItem('qaisar_stamps', currentStamps);
                renderCard();
            }
        }

        // تشغيل النظام فور فتح الصفحة
        renderCard();
    </script>
</body>
</html>
